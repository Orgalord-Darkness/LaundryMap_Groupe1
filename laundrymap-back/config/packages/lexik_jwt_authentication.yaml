lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600
    token_extractors:
        cookie:
            enabled: true
            name: BEARER
        authorization_header:
            enabled: true
    set_cookies:
        BEARER:
            lifetime: 3600
            samesite: strict
            path: /
            domain: null
            httpOnly: true
            secure: '%env(bool:COOKIE_SECURE)%'
            split: []