nelmio_api_doc:
    documentation:
        info:
            title: 'API Documentation'
            description: 'My API description'
            version: '1.0.0'
        components:
            securitySchemes:
                BearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - BearerAuth: []

        # Déclaration manuelle des endpoints json_login (non détectés automatiquement)
        paths:
            /api/v1/admin/login_check:
                post:
                    tags:
                        - Authentification Admin
                    summary: Connexion administrateur
                    security: []  
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [email, password]
                                    properties:
                                        email:
                                            type: string
                                            example: admin@test.fr
                                        password:
                                            type: string
                                            example: MotDePasse123
                    responses:
                        '200':
                            description: Token JWT retourné
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token:
                                                type: string
                        '401':
                            description: Identifiants invalides

    areas:
        default:
            path_patterns:
                - ^/api
            with_attribute: false