security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email 
        admin_provider:
            entity:
                class: App\Entity\Administrateur
                property: email

        # Fusion des deux providers pour les routes communes
        all_users_provider:
            chain:
                providers: [admin_provider, app_user_provider]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        public_api:
            pattern: ^/api/v1/utilisateur/(login_check|inscription)|^/api/v1/professionnel/inscription|^/api/doc
            stateless: true
            security: false

        admin_login:
            pattern: ^/api/v1/admin/login_check
            stateless: true
            provider: admin_provider
            json_login:
                check_path: /api/v1/admin/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Routes admin protégées — provider Administrateur
        admin_api:
            pattern: ^/api/v1/(admin|laverie/admin)
            stateless: true
            provider: admin_provider
            jwt: ~

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~ 

    access_control:
        - { path: ^/api/v1/utilisateur/(login_check|inscription), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/professionnel/(login_check|inscription), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/professionnel/inscription, roles: PUBLIC_ACCESS } 
        - { path: ^/api/v1/admin/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
        # - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        # - { path: ^/api/v1/admin, roles: ROLE_ADMIN }    // A discuter de façon/méthode pour sécuriser les routes
        # - { path: ^/api/v1/professionnel, roles: ROLE_PRO }