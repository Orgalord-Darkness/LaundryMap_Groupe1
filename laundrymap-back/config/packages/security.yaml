security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email 

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        public_api:
            pattern: ^/api/v1/utilisateur/(login_check|inscription)|^/api/doc
            stateless: true
            security: false

        pro_login:
            pattern: ^/api/v1/professionnel/login_check
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/v1/professionnel/login_check
                username_path: email
                password_path: password
                success_handler: App\Security\ProAuthentificationSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~ 

    access_control:
        - { path: ^/api/v1/utilisateur/(login_check|inscription), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/professionnel/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
        # - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }